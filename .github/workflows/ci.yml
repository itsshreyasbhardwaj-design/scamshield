name: ci
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scam-detector
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -r requirements.txt
      - name: Lint (syntax)
        run: python -m compileall app
      - name: Test (offline, zero keys)
        env:
          LLM_PROVIDER: mock
        run: PYTHONPATH=. python -m pytest -q
